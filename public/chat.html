<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – Neumáticos Martinez</title>
  <link rel="stylesheet" href="/dashboard.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }

    .chat-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 56px);
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }

    .msg { display: flex; max-width: 78%; }
    .msg-agent { align-self: flex-start; }
    .msg-user  { align-self: flex-end; flex-direction: row-reverse; }

    .msg-body  { display: flex; flex-direction: column; }
    .msg-user .msg-body { align-items: flex-end; }

    .msg-bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 3px;
      padding: .6rem .9rem;
      font-size: .88rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }
    .msg-user .msg-bubble {
      background: var(--brand-dark);
      border-color: var(--brand);
      border-top-left-radius: var(--radius);
      border-top-right-radius: 3px;
    }
    .msg-bubble ul { padding-left: 1.1rem; margin: .2rem 0; }
    .msg-bubble li { margin-bottom: .15rem; }
    .msg-bubble strong { font-weight: 600; }

    .msg-time {
      font-size: .65rem;
      color: var(--muted);
      margin-top: .2rem;
      padding: 0 .1rem;
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: .3rem 0; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--brand);
      animation: tdot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      padding: .65rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .sug-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: .28rem .7rem;
      font-size: .76rem;
      font-family: var(--font);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .sug-btn:hover { border-color: var(--brand); color: var(--text); }

    /* ── Input area ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      padding: .65rem .9rem;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .8rem;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--brand); }

    #user-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: .88rem;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
    }
    #user-input::placeholder { color: var(--muted); }

    .btn-action {
      width: 34px; height: 34px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .btn-action:hover { border-color: var(--brand); color: var(--brand); }

    .btn-send {
      width: 36px; height: 36px;
      background: var(--brand);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .btn-send:hover    { background: var(--brand-dark); }
    .btn-send:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Status badge in header ── */
    .chat-status {
      display: flex; align-items: center; gap: .4rem;
      font-size: .75rem; color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-ok      { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .status-error   { background: var(--brand); }
    .status-checking { background: #f59e0b; animation: pulse 1.2s infinite; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .msg { max-width: 90%; }
      .chat-messages { padding: .75rem; }
      .suggestions { padding: .5rem .75rem; }
      .input-area { padding: .5rem .65rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <span class="header-icon">🔧</span>
      <div>
        <h1 class="header-title">Neumáticos Martinez</h1>
        <p class="header-sub">Chat</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="chat-status">
        <div class="status-dot status-checking" id="status-dot"></div>
        <span id="status-text">Verificando…</span>
      </div>
      <button class="btn-debug" id="debug-btn" onclick="toggleDebug()" title="Debug mode OFF">🐛</button>
      <div class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <div class="nav-menu" id="nav-menu">
    <a class="nav-item" href="/">Dashboard</a>
    <a class="nav-item active" href="/chat">Chat</a>
    <a class="nav-item" href="/logs.html">Server Logs</a>
  </div>

  <div class="chat-layout">
    <div class="chat-messages" id="chat-messages">
      <div class="msg msg-agent">
        <div class="msg-body">
          <div class="msg-bubble"><p>¡Hola! ¿En qué te puedo ayudar hoy?</p></div>
          <span class="msg-time">Ahora</span>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="sug-btn" onclick="enviarSugerencia('Necesito cubiertas para mi auto')">Necesito cubiertas</button>
      <button class="sug-btn" onclick="enviarSugerencia('¿Qué medidas tienen disponibles?')">Medidas disponibles</button>
      <button class="sug-btn" onclick="enviarSugerencia('¿Dónde están ubicados?')">Ubicación</button>
      <button class="sug-btn" onclick="enviarSugerencia('Quiero un presupuesto')">Pedir presupuesto</button>
    </div>

    <div class="input-area">
      <button class="btn-action" onclick="limpiarChat()" title="Nueva conversación">🗑</button>
      <button class="btn-action" onclick="descargarConversacion()" title="Descargar conversación">↓</button>
      <div class="input-wrap">
        <textarea id="user-input" placeholder="Escribí tu mensaje…" rows="1"></textarea>
      </div>
      <button class="btn-send" onclick="enviarMensaje()" id="send-btn">
        <span id="send-icon">➤</span>
      </button>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('nav-menu').classList.toggle('open');
    }
  </script>
</body>
</html>
