name: Deploy Container to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/cheloim/tiresalesagent/backend:${{ github.sha }},ghcr.io/cheloim/tiresalesagent/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ghcr.io/cheloim/tiresalesagent/frontend:${{ github.sha }},ghcr.io/cheloim/tiresalesagent/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H -p 43422 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare .env file
        run: |
          echo "${{ secrets.SERVER_ENV_FILE }}" > /tmp/.env
          echo "${{ secrets.NGROK_ENDPOINT_AUTHTOKEN }}" > /tmp/ngrok_token

      - name: Transfer deployment files
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/server_key -P 43422 \
            docker-compose.prod.yml \
            deploy/configure-ngrok.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

          scp -o StrictHostKeyChecking=no -i ~/.ssh/server_key -P 43422 \
            /tmp/.env \
            /tmp/ngrok_token \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      - name: Deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/server_key -p 43422 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e

            REPO_DIR="$HOME/tireSalesAgent"
            COMMIT_SHA="${{ github.sha }}"

            echo "=== Detectar / Instalar Docker ==="
            if ! command -v docker &>/dev/null; then
              echo "Docker no encontrado. Instalando..."
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sudo sh /tmp/get-docker.sh
              sudo usermod -aG docker $USER || true
            fi
            echo "Docker version: $(docker --version)"

            echo "=== Detener servicios anteriores ==="
            cd "$REPO_DIR"
            if [ -f docker-compose.prod.yml ]; then
              docker compose -f docker-compose.prod.yml down || true
            fi

            echo "=== Restaurar .env ==="
            if [ -f /tmp/.env ]; then
              cp /tmp/.env $REPO_DIR/.env
            fi

            echo "=== Verificar .env ==="
            if [ ! -f "$REPO_DIR/.env" ]; then
              echo "ERROR: .env no encontrado" >&2
              exit 1
            fi

            echo "=== Backup DB ==="
            if [ -f "$REPO_DIR/conversaciones.db" ]; then
              cp "$REPO_DIR/conversaciones.db" "$REPO_DIR/conversaciones.db.bak"
            fi

            echo "=== Actualizar compose con nueva imagen ==="
            export COMMIT_SHA='$COMMIT_SHA'
            sed -i "s/ghcr.io\/cheloim\/tiresalesagent\/backend:latest/ghcr.io\/cheloim\/tiresalesagent\/backend:\$COMMIT_SHA/g" $REPO_DIR/docker-compose.prod.yml
            sed -i "s/ghcr.io\/cheloim\/tiresalesagent\/frontend:latest/ghcr.io\/cheloim\/tiresalesagent\/frontend:\$COMMIT_SHA/g" $REPO_DIR/docker-compose.prod.yml

            echo "=== Configurar ngrok ==="
            export NGROK_ENDPOINT_AUTHTOKEN=$(cat /tmp/ngrok_token)
            bash /tmp/configure-ngrok.sh

            echo "=== Pull nuevas imagenes ==="
            docker pull ghcr.io/cheloim/tiresalesagent/backend:$COMMIT_SHA
            docker pull ghcr.io/cheloim/tiresalesagent/frontend:$COMMIT_SHA

            echo "=== Iniciar servicios ==="
            cd "$REPO_DIR"
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Health check ==="
            sleep 10
            curl -sf http://localhost:5000/api/estado && echo " API OK" || exit 1
            curl -sf http://localhost:8080/ && echo " Frontend OK" || exit 1

            echo "=== Logs ==="
            docker compose -f docker-compose.prod.yml logs --tail=20 || true

            echo "=== Contenedores activos ==="
            docker compose -f docker-compose.prod.yml ps
          '

      - name: Verify deployment
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/server_key -p 43422 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'curl -sf http://localhost:5000/api/estado && echo " OK" || exit 1'