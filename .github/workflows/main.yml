name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        echo "$PRIVATE_KEY" > github-ec2.pem && chmod 600 github-ec2.pem
        ssh -o StrictHostKeyChecking=no -i github-ec2.pem ${USER}@${HOST} '
          set -e

          REPO_URL="https://github.com/cheloim/tireSalesAgent.git"
          BRANCH="main"
          REPO_DIR="$HOME/tire_sales_agent"

          echo "=== Verificar .env ==="
          if [ ! -f "$REPO_DIR/.env" ]; then
            echo "ERROR: .env no encontrado en $REPO_DIR — el deploy se cancela." >&2
            exit 1
          fi

          echo "=== Backup DB ==="
          if [ -f "$REPO_DIR/conversaciones.db" ]; then
            cp "$REPO_DIR/conversaciones.db" "$REPO_DIR/conversaciones.db.bak"
            echo "Backup creado: conversaciones.db.bak"
          fi

          echo "=== Pull código ==="
          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR"
            git pull origin "$BRANCH"
          else
            git clone "$REPO_URL" "$REPO_DIR"
            cd "$REPO_DIR"
          fi

          echo "=== Virtualenv ==="
          if ! python3 -m venv --help &>/dev/null; then
            echo "python3-venv no encontrado. Instalando..."
            sudo apt-get install -y python3-venv
          fi
          if [ ! -d "$REPO_DIR/.venv" ]; then
            python3 -m venv "$REPO_DIR/.venv"
          fi

          echo "=== Dependencias Python ==="
          "$REPO_DIR/.venv/bin/pip" install --upgrade pip -q
          "$REPO_DIR/.venv/bin/pip" install -r "$REPO_DIR/requirements.txt" -q

          echo "=== Dependencias Node ==="
          cd "$REPO_DIR" && npm install --omit=dev --silent

          echo "=== Servicios systemd ==="
          sudo cp "$REPO_DIR/tire-agent.service"     /etc/systemd/system/
          sudo cp "$REPO_DIR/tire-agent-web.service" /etc/systemd/system/
          sudo systemctl daemon-reload

          echo "=== Restart servicios ==="
          sudo systemctl restart tire-agent
          sudo systemctl restart tire-agent-web

          echo "=== Health check ==="
          sleep 3
          curl -sf http://localhost:5000/api/estado && echo "API OK" || echo "WARN: API no responde"

          echo "=== Estado ==="
          sudo systemctl is-active tire-agent    && echo "tire-agent OK"     || echo "tire-agent FAIL"
          sudo systemctl is-active tire-agent-web && echo "tire-agent-web OK" || echo "tire-agent-web FAIL"
        '
