name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        echo "$PRIVATE_KEY" > github-ec2.pem && chmod 600 github-ec2.pem

        scp -o StrictHostKeyChecking=no -i github-ec2.pem deploy/install-services.sh ${USER}@${HOST}:/tmp/install-services.sh
        scp -o StrictHostKeyChecking=no -i github-ec2.pem .env ${USER}@${HOST}:/tmp/.env 2>/dev/null || true

        ssh -o StrictHostKeyChecking=no -i github-ec2.pem ${USER}@${HOST} '
          set -e

          REPO_URL="https://github.com/cheloim/tireSalesAgent.git"
          BRANCH="main"
          REPO_DIR="$HOME/tireSalesAgent"

          echo "=== Clonar / Pull repo ==="
          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR"
            git pull origin "$BRANCH"
          else
            git clone "$REPO_URL" "$REPO_DIR"
            cd "$REPO_DIR"
          fi

          echo "=== Verificar .env ==="
          if [ ! -f "$REPO_DIR/.env" ]; then
            echo "ERROR: .env no encontrado en $REPO_DIR — el deploy se cancela." >&2
            exit 1
          fi

          echo "=== Backup DB ==="
          if [ -f "$REPO_DIR/conversaciones.db" ]; then
            cp "$REPO_DIR/conversaciones.db" "$REPO_DIR/conversaciones.db.bak"
            echo "Backup creado: conversaciones.db.bak"
          fi

          echo "=== Virtualenv (Amazon Linux) ==="
          if ! python3.11 -m venv --help &>/dev/null; then
            echo "python3.11 no encontrado. Instalando con dnf..."
            sudo dnf install -y python3.11 python3.11-venv
          fi
          if [ ! -d "$REPO_DIR/.venv" ]; then
            python3.11 -m venv "$REPO_DIR/.venv"
          fi

          echo "=== Dependencias Python ==="
          "$REPO_DIR/.venv/bin/python" -m pip install --upgrade pip -q
          "$REPO_DIR/.venv/bin/python" -m pip install -r "$REPO_DIR/requirements.txt" -q

          echo "=== Dependencias Node ==="
          cd "$REPO_DIR" && npm install --omit=dev --silent

          echo "=== Ejecutar install-services.sh ==="
          bash /tmp/install-services.sh
        '