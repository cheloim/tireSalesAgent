<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Interno – Neumáticos Martinez</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <span class="header-icon">🔧</span>
      <div>
        <h1 class="header-title">Neumáticos Martinez</h1>
        <p class="header-sub">Panel Interno</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="last-update" class="last-update">—</span>
      <button class="btn-refresh" onclick="cargarTodo()">↻ Actualizar</button>
    </div>
  </header>

  <main class="main">

    <!-- ── MÉTRICAS ── -->
    <section class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Chats activos</div>
        <div class="metric-value" id="chats-activos">—</div>
        <div class="metric-sub">últimas 2 hs</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Presupuestos hoy</div>
        <div class="metric-value" id="presup-hoy">—</div>
        <div class="metric-sub" id="total-hoy">$—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Presupuestos semana</div>
        <div class="metric-value" id="presup-semana">—</div>
        <div class="metric-sub" id="total-semana">$—</div>
      </div>
      <div class="metric-card" id="card-agentes">
        <div class="metric-label">Agentes activos</div>
        <div id="agentes-lista" class="agentes-lista">—</div>
      </div>
    </section>

    <!-- ── TABLAS ── -->
    <div class="tables-row">

      <section class="table-section">
        <h2 class="section-title">Chats activos <span class="badge" id="badge-chats">0</span></h2>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Canal</th>
                <th>Agente</th>
                <th>Mensajes</th>
                <th>Última actividad</th>
              </tr>
            </thead>
            <tbody id="tbody-chats">
              <tr><td colspan="4" class="empty">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="table-section">
        <h2 class="section-title">Logs últimos 7 días <span class="badge" id="badge-logs">0</span></h2>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Canal</th>
                <th>Agente</th>
                <th>Mensajes</th>
              </tr>
            </thead>
            <tbody id="tbody-logs">
              <tr><td colspan="4" class="empty">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </div>
  </main>

  <script src="/static/dashboard.js"></script>
</body>
</html>
